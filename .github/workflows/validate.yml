name: Validate

# Validates the Thunderstore package shape on every push / PR.
# Does not compile (game DLLs aren't publicly redistributable, so hosted runners
# can't build). The actual build + packaging step is run locally via tools/package.ps1.

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest.json (Thunderstore rules)
        run: |
          python3 - <<'EOF'
          import json, re, sys
          m = json.load(open("manifest.json"))
          req = ["name", "version_number", "website_url", "description", "dependencies"]
          missing = [k for k in req if k not in m]
          assert not missing, f"manifest.json missing required keys: {missing}"
          assert re.fullmatch(r"[a-zA-Z0-9_]+", m["name"]), f"'name' must be [a-zA-Z0-9_]+, got {m['name']!r}"
          assert len(m["name"]) <= 128, "'name' must be <= 128 chars"
          assert re.fullmatch(r"\d+\.\d+\.\d+", m["version_number"]), f"'version_number' must be Major.Minor.Patch, got {m['version_number']!r}"
          assert len(m["description"]) <= 250, f"'description' must be <= 250 chars (got {len(m['description'])})"
          assert isinstance(m["dependencies"], list), "'dependencies' must be a list"
          for d in m["dependencies"]:
              assert isinstance(d, str) and re.fullmatch(r"[a-zA-Z0-9_]+-[a-zA-Z0-9_]+-\d+\.\d+\.\d+", d), \
                  f"dependency must be 'Team-Name-X.Y.Z', got {d!r}"
          print("manifest.json OK")
          EOF

      - name: icon.png is a 256x256 PNG
        run: |
          python3 - <<'EOF'
          import struct
          b = open("icon.png","rb").read()
          assert b[:8] == b"\x89PNG\r\n\x1a\n", "icon.png is not a PNG"
          w, h = struct.unpack(">II", b[16:24])
          assert (w, h) == (256, 256), f"icon.png must be 256x256, got {w}x{h}"
          print("icon.png OK")
          EOF

      - name: README.md is UTF-8
        run: |
          python3 - <<'EOF'
          open("README.md","rb").read().decode("utf-8")
          print("README.md OK (UTF-8)")
          EOF

      - name: LICENSE exists
        run: test -f LICENSE && echo "LICENSE OK"
